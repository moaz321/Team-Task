name: Provision, Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/team-tasks:latest

jobs:
  terraform:
    name: Provision EC2 with Terraform
    runs-on: ubuntu-latest
    outputs:
      ec2_ip: ${{ steps.output_ip.outputs.ec2_ip }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: List files in Iac/terraform (debugging)
        run: ls -R ./Iac/terraform  # Check files in the terraform directory

      - name: Init Terraform
        working-directory: ./Iac/terraform
        run: terraform init

      - name: Terraform Plan
        working-directory: ./Iac/terraform
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          TF_LOG: DEBUG
        run: terraform plan

      - name: Apply Terraform
        working-directory: ./Iac/terraform
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          TF_LOG: DEBUG
        run: terraform apply -auto-approve

      - name: Get EC2 IP
        id: output_ip
        working-directory: ./Iac/terraform
        run: |
          echo "ec2_ip=$(terraform output -raw public_ip)" >> $GITHUB_OUTPUT

  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: terraform
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
