version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner   # use the final stage in multi-stage Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env.local     # your Supabase keys
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

